<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
	
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#ff4d4d">
	<link rel="apple-touch-icon" href="icon.png">
	
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Portal v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 414px; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding-bottom: 40px; display: flex; flex-direction: column; }
        .header-card { background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.6)), url('reminder.avif'); background-size: cover; height: 130px; display: flex; align-items: flex-end; padding: 20px; color: white; }
        .menu-container { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .menu-item { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { border-color: #ff4d4d; background: #fff9f9; }
        .menu-item i { font-size: 1.2rem; color: #ff4d4d; width: 25px; text-align: center; }
        .menu-text h4 { margin: 0; font-size: 0.95rem; color: #333; }
        .menu-text p { margin: 0; font-size: 0.7rem; color: #777; }
        .question-section { padding: 12px 25px; }
        .label-text { font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; color: #333; display: block; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box; background-color: #f9f9f9; }
        .info-box { background-color: #f0f7ff; border-left: 4px solid #007bff; padding: 10px; margin-top: 5px; font-size: 0.75rem; color: #444; border-radius: 0 8px 8px 0; }
        .hidden { display: none; }
        .btn-action { width: calc(100% - 50px); margin: 10px auto; padding: 14px; border-radius: 30px; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; border: none; }
        .btn-submit { background: #ff4d4d; color: white; }
		.btn-wa { background: #25d366; color: white; margin-top: 5px; }
		.btn-email { background: #007bff; color: white; }
        .btn-back { background: #6c757d; color: white; margin-top: 15px; }
        #result1-display { margin: 15px 25px; padding: 15px; background: #fff; border-radius: 12px; border: 1px solid #ddd; }
		#result2-display { margin: 15px 25px; padding: 15px; background: #fff; border-radius: 12px; border: 1px solid #ddd; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; }
        .res-bold { font-weight: bold; color: #ff4d4d; }
        .badge { padding: 2px 8px; border-radius: 5px; color: white; font-size: 0.7rem; font-weight: bold; }
		
		.token-list { margin-top: 15px; border-top: 1px solid #eee; pt: 10px; }
		.token-item { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; margin-bottom: 5px; padding: 5px 10px; border-radius: 6px; }
		.token-pass { background-color: #d4edda; color: #155724; } /* Hijau */
		.token-fail { background-color: #f8d7da; color: #721c24; opacity: 0.7; } /* Merah */
		.token-item i { width: 15px; text-align: center; }		
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <div id="header-title"><h1>KDS Portal</h1><p>Financing Support System</p></div>
    </div>

    <div id="main-menu" class="menu-container">
        <div class="menu-item" onclick="openTool('crack')"><i class="fas fa-unlock-alt"></i><div class="menu-text"><h4>1. Analisa Bunga Pasar</h4><p>Hitung Bunga Flat & Efektif Tabel Leasing</p></div></div>
        <div class="menu-item" onclick="openTool('kalkulator')"><i class="fas fa-calculator"></i><div class="menu-text"><h4>2. Kalkulator KDS</h4><p>Analisa Cicilan & Penawaran</p></div></div>
    </div>

    <div id="form-crack" class="hidden">
        <div class="question-section"><label class="label-text">OTR Unit (Brosur)</label><input type="text" id="c_otr" oninput="formatCurrency(this)"></div>
        <div class="question-section"><label class="label-text">DP Gross (Brosur)</label><input type="text" id="c_dp" oninput="formatCurrency(this)"></div>
        <div class="question-section">
			<label class="label-text">Voucher/Subsidi</label>
			<input type="text" id="c_voucher" value="0" oninput="formatCurrency(this)">
			<div class="info-box">Subsidi DP (misal: 500000)</div>
		</div>
        <div class="question-section"><label class="label-text">Angsuran/Bulan</label><input type="text" id="c_angs" oninput="formatCurrency(this)"></div>
        <div class="question-section"><label class="label-text">Tenor</label><input type="number" id="c_tenor"></div>
        <button class="btn-action btn-submit" onclick="runCrack()">Analisa Leasing</button>
    </div>
	
    <div id="form-kalkulator" class="hidden">
        <div class="question-section"><label class="label-text">OTR Unit (Brosur)</label><input type="text" id="k_otr" oninput="formatCurrency(this)" placeholder="Contoh: 25000000"></div>
        <div class="question-section"><label class="label-text">DP Netto</label><input type="text" id="k_dpnet" oninput="formatCurrency(this)" placeholder="Contoh: 3000000"></div>
        <div class="question-section">
            <label class="label-text">Suku Bunga Flat per Bulan (%)</label>
            <input type="number" step="0.05" id="k_bunga_manual" value="10">
            <div class="info-box">Masukkan suku bunga flat bulanan</div>
        </div>
		<div class="question-section"><label class="label-text">Dari Tenor</label><input type="number" id="k_dtenor"></div>
		<div class="question-section"><label class="label-text">Sampai Tenor</label><input type="number" id="k_stenor"></div>
		<div class="question-section"><label class="label-text">Stepping Tenor</label><input type="number" id="k_step"></div>
        <button class="btn-action btn-submit" onclick="runKalkulator()">Analisa Cicilan</button>
    </div>	
	
	<div id="result1-display" class="hidden"></div>

    <div id="form-bargaining" class="hidden">
		<div class="question-section"><label class="label-text">Angsuran/Bulan</label><input type="text" id="b_angs" oninput="formatCurrency(this)"></div>
        <div class="question-section"><label class="label-text">Tenor</label><input type="number" id="b_tenor"></div>
        <button class="btn-action btn-submit" onclick="runBargaining()">Analisa Kelayakan</button>
		<div class="question-section"><label class="label-text">Gimmick</label><input type="text" id="b_gimmick"></div>
		<button class="btn-action btn-submit" onclick="runTabel()">Buat Penawaran</button>
    </div>
	
	<div id="result2-display" class="hidden"></div>
	
	<div id="form-whatsapp" class="hidden">
		<div class="question-section"><label class="label-text">No. WhatsApp Pelanggan</label><input type="tel" id="wa_number" placeholder="6281370373223"></div>
		<button id="wa-btn" class="btn-action btn-wa" onclick="sendWA()"><i class="fab fa-whatsapp"></i> Whatsapp Penawaran</button>
	</div>	
	
	<div id="form-email" class="hidden">
		<div class="question-section"><label class="label-text">Email Pelanggan</label><input type="email" id="cust_email" placeholder="hendra.soewarno@gmail.com"></div>
		<button id="email-btn"class="btn-action btn-email" onclick="sendEmail()"><i class="fas fa-envelope"></i> Email Penawaran</button>
	</div>
	
    <button id="btn-back" class="btn-action btn-back hidden" onclick="goBack()"><i class="fas fa-arrow-left"></i> Kembali</button>		   
</div>

<script>
	//resiko bad debt
	let NPF = 0.02; //Resiko Non-Performing Loan
			
	//kehilangan Potensi Insentif Leasing jika dilimpahkan ke Fincoy
	let PIL = 750000;
	
	// Cost of fund=1% 
    let bungaPMT = 0.01; 	
	
	function el(id) {
		return document.getElementById(id);
	}
	
	function formatCurrencyValue(value) {
		if (value !== "") {
			return new Intl.NumberFormat('en-US').format(value);
		} else {
			return "";
		}
	}	
	
	function formatCurrency(input) {
		// 1. Ambil angka saja dari input
		let value = input.value.replace(/\D/g, "");
		
		// 2. Format menjadi ribuan dengan titik
		if (value !== "") {
			input.value = new Intl.NumberFormat('en-US').format(value);
		} else {
			input.value = "";
		}
	}

	// Fungsi pembantu untuk mengambil nilai asli (angka) saat perhitungan
	function getCleanNumber(id) {
		let val = el(id).value;
		return parseFloat(val.replace(/,/g, "")) || 0;
	}	
	
    const KDS = {
        presentValue: (payment, rate, term) => {
            if (rate == 0) rate = 0.00000001;
            return payment * ((1 - Math.pow((1 + rate), -term)) / rate);
        },
        guessPresentValue: (pv, payment, term, initialRate) => {
            let top = initialRate, bottom = -initialRate, maxIter = 0, guessRate;
            do {
                guessRate = (top + bottom) / 2;
                let gpv = KDS.presentValue(payment, guessRate, term);
                if (gpv < pv) top = guessRate; else bottom = guessRate;
                maxIter++;
                if (maxIter > 10000) return 0;
            } while (top - bottom > 0.00001);
            return (top + bottom) / 2;
        },
        hitungPremiAsuransi: (wilayah, tenor, otr) => {
			//premi asuransi
            if (tenor <= 12) return (1.95 * otr) / 100;
            if (tenor < 24) return (2.78 * otr) / 100;
            if (tenor < 30) return (3.608 * otr) / 100;
            if (tenor < 36) return (4.34 * otr) / 100;
            return (5.07 * otr) / 100;
        },
        hitungADM: (wilayah, tenor) => {
			// biaya tenaga kerja dan administrasi
            if (tenor <= 12) return 100000;
            if (tenor <= 24) return 150000;
            return 200000;
        },
        getPokok: (wilayah, tenor, otr, dp) => {		
            return otr - dp; //pokok piutang
        },
		getCOGS: (wilayah, tenor, otr, dp) => {
			//OTR dikurang DP ditambah biaya ADM ditambah premi asuransi
			//harga pokok penjualan
            return (otr - dp) + KDS.hitungADM(wilayah, tenor) + KDS.hitungPremiAsuransi(wilayah, tenor, otr); 
        },		
        hitungPotensiProfit: (wilayah, tenor, otr, dp, angsuran) => {
            let cogs = KDS.getCOGS(wilayah, tenor, otr, dp);
					
            let indexPMT = (1 - 1 / Math.pow(1 + bungaPMT, tenor)) / bungaPMT;
			
			// PV dari total angsuran
			let pvTotalAnsuran = (angsuran*indexPMT);
			
			// PV dari total angsuran - cogs
            let grossMargin =  pvTotalAnsuran - cogs;
			
            return grossMargin - PIL - (cogs * NPF);
        }
    };
	
	// Fungsi Check Kesesuaian KDS
	function checkKesesuaianKDS(flat, dpPersen, tenor, allCheck=false) {	
		// --- LOGIKA TOKEN (CHECKLIST) ---
		const tokens = [
			{ 
				label: "Token Suku Bunga (<25%)", 
				pass: flat < 0.25 
			},
			{ 
				label: "Token DP Rendah (<20%)", 
				pass: dpPersen < 0.20 
			},
			{ 
				label: "Token DP Besar (>50%) & Bunga <30%", 
				pass: dpPersen > 0.50 && flat < 0.30 
			},
			{ 
				label: "Token Tenor Singkat (<12 bln) & Bunga <30%", 
				pass: tenor < 12 && flat < 0.30 
			},
			{ 
				label: "Token Khusus (Tenor 12-15 bln, DP >50%, Bunga <30%)", 
				pass: tenor < 15 && dpPersen > 0.50 && flat < 0.30 
			}
		];

		// Generate HTML Checklist
		let tokenHtml = `<div class="token-list">`;
		tokens.forEach(t => {
			if (t.pass || allCheck) {
				const statusClass = t.pass ? "token-pass" : "token-fail";
				const icon = t.pass ? "fa-check-circle" : "fa-times-circle";
				tokenHtml += `
					<div class="token-item ${statusClass}">
						<i class="fas ${icon}"></i>
						<span>${t.label}</span>
					</div>`;
			}
		});
		tokenHtml += `</div>`;
		
		return tokenHtml;
	}
	
	function scrollToView(element) {
		// TAMBAHKAN INI:
		el(element).scrollIntoView({ 
			behavior: 'smooth', 
			block: 'start' 
		});	
	}
	
    // Fungsi Crack & Bargaining (tetap sama dari versi sebelumnya)
	function runCrack() {
		let otr = getCleanNumber('c_otr');
		let dp = getCleanNumber('c_dp');
		let voc = getCleanNumber('c_voucher');
		let ang = getCleanNumber('c_angs');
		let ten = parseInt(el('c_tenor').value);
			
		if (!otr || !dp || !ang || !ten) return alert("Mohon lengkapi data analisa!");

		let dpNet = dp - voc;
		let dpPersen = dpNet / otr;
		let pokok = otr - dpNet;
		let flat = (((ten * ang) / pokok) - 1) * 12 / ten;
		let eff = KDS.guessPresentValue(pokok, ang, ten, 0.1) * 12;

		let kesesuaianHtml = checkKesesuaianKDS(flat, dpPersen, ten);

		// Tampilkan Hasil Utama
		showResult("result1-display", `
			<div class="res-row"><span>OTR:</span><span class="res-bold">Rp ${otr.toLocaleString()}</span></div>
			<div class="res-row"><span>Uang Muka Net (${(dpPersen * 100).toFixed(2)}%):</span><span class="res-bold">Rp ${dpNet.toLocaleString()}</span></div>
			<div class="res-row"><span></span><span class="res-bold">----------------------</span></div>
			<div class="res-row"><span>Pokok Hutang:</span><span class="res-bold">Rp ${pokok.toLocaleString()}</span></div>
			<div class="res-row"><span>Bunga Flat:</span><span class="res-bold">${(flat * 100).toFixed(2)}% /thn</span></div>
			<div class="res-row"><span>Bunga Efektif:</span><span class="res-bold">${(eff * 100).toFixed(2)}% /thn</span></div>
			
			<div style="margin-top:15px; font-weight:bold; font-size:0.8rem; color:#333;">Checklist Token (Negotiable)</div>
			${kesesuaianHtml}
		`);
		
		scrollToView("result1-display");

		// Kirim data ke Kalkulator KDS untuk langkah selanjutnya
		el('k_otr').value = formatCurrencyValue(otr);
		el('k_dpnet').value = formatCurrencyValue(dpNet);
		el('k_bunga_manual').value = (flat * 100 / 12).toFixed(2); //kali 100
		el('k_dtenor').value = ten-3;
		el('k_stenor').value = ten+3;
		el('k_step').value = 3;
	}
		

    function runKalkulator() {
		el("b_gimmick").value = "";
        let otr = getCleanNumber('k_otr');
        let dpnet = getCleanNumber('k_dpnet');
        let bngBulanan = parseFloat(el('k_bunga_manual').value);
		let dten = parseFloat(el('k_dtenor').value);
		let sten = parseFloat(el('k_stenor').value);
		let step = parseFloat(el('k_step').value);
        let wil = "CDN"; //tidak ada lagi membedakan ACEH, RIAU, RIAU KEPULAUAN
        
        if (!otr || !dpnet || isNaN(bngBulanan)) return alert("Lengkapi data OTR, DP, dan Bunga!");
		
		let flat = bngBulanan*12/100; //bagi 100
		let dpPersen = dpnet/otr;
        
        let html = `<b>Pilih x Cicilan (Bunga ${bngBulanan}%/bulan):</b><hr>`;
        
        for (let ten=dten; ten<=sten; ten+=step) {
			let pk = KDS.getPokok(wil, ten, otr, dpnet);
			let angsuran = Math.floor(((pk * (1 + (bngBulanan/100 * ten))) / ten)/1000) * 1000;
            
            let profit = KDS.hitungPotensiProfit(wil, ten, otr, dpnet, angsuran);
            let pi = (pk + profit) / pk;
            let skala = Math.sign(profit) * Math.log10(Math.abs(profit) || 1);
			
            let color = profit > 0 ? "#28a745" : "#dc3545";

			let kesesuaianHtml = checkKesesuaianKDS(flat, dpPersen, ten);			

            html += `
                <div style="margin-bottom:10px; border-bottom: 1px dashed #ddd; padding-bottom:5px;" onclick="setPenawaran(formatCurrencyValue(${angsuran}), ${ten})">
                    <div class="res-row"><span>Tenor ${ten}x:</span><span class="res-bold">Rp ${Math.ceil(angsuran).toLocaleString()}/bulan</span></div>
                    <div class="res-row"><small>Index Profit (PI):</small><small class="res-bold">${pi.toFixed(3)}</small></div>
                    <div class="res-row"><small>Skala Profit:</small><span class="badge" style="background:${color}">${skala.toFixed(2)}</span></div>
                </div>
				${kesesuaianHtml}`;
        };
        showResult("result1-display", html);
		
		scrollToView("result1-display");

		//tampil form-bargaining
		el('form-bargaining').classList.remove('hidden');		
    }
	
	function setPenawaran(angsuran, tenor) {
		el('b_angs').value = angsuran;
		el('b_tenor').value = tenor;
	}

    function openTool(tool) {
        el('main-menu').classList.add('hidden');
        el('btn-back').classList.remove('hidden');
        ['form-crack', 'form-kalkulator', 'form-bargaining', 'form-whatsapp', 'form-email'].forEach(id => el(id).classList.add('hidden'));
        el('result1-display').classList.add('hidden');
		el('result2-display').classList.add('hidden');
        el('form-' + tool).classList.remove('hidden');
    }

    function goBack() {
        el('main-menu').classList.remove('hidden');
        el('btn-back').classList.add('hidden');
        el('result1-display').classList.add('hidden');
		el('result2-display').classList.add('hidden');
        ['form-crack', 'form-kalkulator', 'form-bargaining', 'form-whatsapp', 'form-email'].forEach(id => el(id).classList.add('hidden'));
    }

    function showResult(id, content) {
        const res = el(id);
        res.innerHTML = content;
        res.classList.remove('hidden');
    }

    function runBargaining() {
        let otr = getCleanNumber('k_otr');
        let dpnet = getCleanNumber('k_dpnet');
		let ang = getCleanNumber('b_angs');
		let ten = parseFloat(el('b_tenor').value);
        let wil = "CDN";
		
		if (!otr || !dpnet) return alert("Lengkapi data OTR, DP!");
		
		let dpPersen = dpnet/otr;
		
		let html = `<b>Hasil Analisa:</b><hr>`;	
					
        [ten].forEach(t => {
			let pk = KDS.getPokok(wil, t, otr, dpnet);
			let flat = (( (ten * ang) / pk ) - 1) * 12 / ten;
			let eff = KDS.guessPresentValue(pk, ang, ten, 0.1) * 12;		
           
            let profit = KDS.hitungPotensiProfit(wil, t, otr, dpnet, ang);
            let pi = (pk + profit) / pk;
            let skala = Math.sign(profit) * Math.log10(Math.abs(profit) || 1);
			
            let color = profit > 0 ? "#28a745" : "#dc3545";
			
			let kesesuaianHtml = checkKesesuaianKDS(flat, dpPersen, ten);			

            html += `
                <div style="margin-bottom:10px; border-bottom: 1px dashed #ddd; padding-bottom:5px;" onclick="setPenawaran(${ang}, ${ten})">
                    <div class="res-row"><span>Tenor ${ten}x:</span><span class="res-bold">Rp ${Math.ceil(ang).toLocaleString()}/bulan</span></div>
                    <div class="res-row"><small>Index Profit (PI):</small><small class="res-bold">${pi.toFixed(3)}</small></div>
                    <div class="res-row"><small>Skala Profit:</small><span class="badge" style="background:${color}">${skala.toFixed(2)}</span></div>
                </div>
				${kesesuaianHtml}`;
        });
        showResult("result2-display", html);
		
		scrollToView("b_gimmick");
    }
	
	let currentTableData = ""; // Store table for WhatsApp
	
    function runTabel() {
        let otr = getCleanNumber('k_otr');
        let dpnet = getCleanNumber('k_dpnet');
		let ang = getCleanNumber('b_angs');
		let ten = parseFloat(el('b_tenor').value);
		let gimmick = el('b_gimmick').value.trim();
				
        let wil = "CDN";
		
		let html = `<b>Tabel Cicilan:</b><hr>`;	
		
		currentTableData = `*PENAWARAN PEMBIAYAAN MOTOR*\n\nOTR: Rp ${otr.toLocaleString()}\n\nDP Net: Rp ${dpnet.toLocaleString()}\n\n`				
		
		let pk = KDS.getPokok(wil, ten, otr, dpnet);
		let flat = (( (ten * ang) / pk ) - 1) * 12 / ten;
							
		let angsuran = Math.floor(((pk * (1 + (flat/12 * ten))) / ten)/1000) * 1000;
		
		let profit = KDS.hitungPotensiProfit(wil, ten, otr, dpnet, angsuran);
						
		if (profit > 0) {
			currentTableData += `Tenor ${ten} bln @ Rp ${angsuran.toLocaleString()}/bulan\n`;
			if (gimmick.length>3)
				currentTableData += `\n*${gimmick}*\n`;
				
			showResult("result2-display", currentTableData.replaceAll("\n", "<br>"));
			el('form-whatsapp').classList.remove('hidden');
			el('form-email').classList.remove('hidden');
			
			scrollToView("result2-display");
		}
		else {
			alert(`Tenor ${ten} bln @ Rp ${angsuran.toLocaleString()}/bulan tidak layak ditawarkan karena profitabilitas < 0`);		
		}
    }
	
	function sendWA() {
        let phone = el('wa_number').value;
        if(!phone) return alert("Masukkan nomor WhatsApp!");
        if(!phone.startsWith('62')) phone = '62' + phone.replace(/^0/, '');
        
        let text = encodeURIComponent(currentTableData + "\n\nNb.-Penawaran ini bersifat tidak mengikat\n-Harga dapat berubah setiap saat\n-Lakukan konfirmasi sesegera mungkin.");
        window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }
	
	function sendEmail() {
        let email = el('cust_email').value;
        if(!email) return alert("Masukkan alamat email!");
        
        let subject = encodeURIComponent("Penawaran Pembiayaan Motor");
        let body = encodeURIComponent(currentTableData.replace(/\*/g, "") + "\n\nNb.-Penawaran ini bersifat tidak mengikat\n-Harga dapat berubah setiap saat\n-Lakukan konfirmasi sesegera mungkin.");
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
    }	
</script>
<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW Registered!', reg))
      .catch(err => console.log('SW Registration Failed', err));
  });
}
</script>
